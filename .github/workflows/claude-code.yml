name: Claude Code Issue Implementation

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  implement:
    # issueに"claude"ラベルが付けられた時、または"claude"ラベル付きissueにコメントされた時に実行
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'claude') ||
      (github.event_name == 'issue_comment' && !github.event.issue.pull_request && contains(github.event.issue.labels.*.name, 'claude') && github.event.comment.body == '/claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-20250514
